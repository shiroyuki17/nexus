services:
  postgres:
    image: postgres:16-alpine
    container_name: nexus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexus
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
    ports:
      - "5432:5432"
    volumes:
      - nexus_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexus-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://nexus:nexus@postgres:5432/nexus
      CORS_ORIGIN: http://localhost:5173
      DEFAULT_COMPANY_ID: demo-company
      DEFAULT_COMPANY_NAME: Demo Company
    ports:
      - "4000:4000"
    command: sh -c "npx prisma db push && node backend/data/seed.js && node backend/server.js"

volumes:
  nexus_pg_data:
